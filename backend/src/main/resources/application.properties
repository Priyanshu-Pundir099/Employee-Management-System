# Server Configuration
server.port=8080

# Database Configuration (Switched from MySQL to H2 In-Memory - Fixed URL)
spring.datasource.url=jdbc:h2:mem:employee_management_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration (Optimized for H2 Database)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Web Console Configuration (Allows you to view tables in your browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.empms=DEBUG

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false